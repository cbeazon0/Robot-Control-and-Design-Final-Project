motion_controller:
  ros__parameters:
    odom_topic: "/odom"
    cmd_vel_topic: "/cmd_vel"
    control_rate_hz: 20.0

    # Velocity limits (real-hardware-friendly defaults)
    max_linear_speed: 0.15        # m/s
    max_angular_speed: 0.6        # rad/s

    # P-controller gains
    linear_kp: 0.8
    angular_kp: 1.5

    # Goal tolerances
    distance_tolerance: 0.02      # m
    angle_tolerance: 0.02         # rad (~1.15 deg)

    # Safety
    odom_timeout_s: 0.5

odom_tracker:
  ros__parameters:
    odom_topic: "/odom"
    state_topic: "/robot_state"
    publish_rate_hz: 20.0
